services:
  mongodb:
    image: mongo:7
    container_name: acgc-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: acgc
    volumes:
      - acgc-mongo-data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  acgc-mongo-data:
